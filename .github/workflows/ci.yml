name: Verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test review workflow
        run: npm test
      - name: Check Astro and TypeScript
        run: npm run check
      - name: Exercise fixture pipeline
        run: npm run review:fixture
      - name: Build Astro site
        run: npm run build
